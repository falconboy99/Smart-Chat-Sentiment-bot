name: Node.js Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Backend setup and build
      - name: Install backend dependencies
        run: npm ci
        working-directory: ./

      - name: Run backend tests (if available)
        run: npm test --if-present
        working-directory: ./
        continue-on-error: true

      - name: Lint backend code (if available)
        run: npm run lint --if-present
        working-directory: ./
        continue-on-error: true

      # Frontend setup and build
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./chatapp

      - name: Build frontend (React)
        run: npm run build
        working-directory: ./chatapp
        env:
          CI: true

      - name: Run frontend tests (if available)
        run: npm test --watchAll=false --passWithNoTests
        working-directory: ./chatapp
        continue-on-error: true

      # Docker build validation (optional)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: smart-chat-sentiment-bot:${{ github.sha }}
        continue-on-error: true

  # Optional: Security scanning
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (backend)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (frontend)
        run: npm audit --audit-level=moderate
        working-directory: ./chatapp
        continue-on-error: true
